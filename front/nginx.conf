user  root;
worker_processes  1;

# Store PID in /tmp (always writable)
pid /tmp/nginx.pid;

events {
}

http {
    server {
        listen       80;
        server_name  localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            proxy_pass http://frontend:3000/;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
        }
    }
}