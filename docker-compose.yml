networks:
  prod:

services:
  backend:
    build:
      context: ./back
    networks:
      - prod
    depends_on:
      - db
    env_file:
      - ./back/.env
    ports:
      - 8000:8000

  frontend:
    build:
      context: ./front
    depends_on:
      - backend
    networks:
      - prod
    ports:
      - 3000:80

  db:
    image: postgres:16.14-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5430:5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    networks:
      - prod
